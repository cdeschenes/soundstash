upstream app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Max upload size (match app limit)
    client_max_body_size 512m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Media files — served directly by Nginx with auth check
    location /media/ {
        # NOTE: In a homelab environment, this simply serves files from the
        # mounted volume. For internet-facing deployments, uncomment auth_request.
        #
        auth_request /api/auth/check;
        error_page 401 = @error401;

        alias /media/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "private, max-age=3600";

        # Serve waveform peaks with appropriate headers
        location ~* \.json$ {
            add_header Content-Type application/json;
        }
    }

    # Proxy everything else to Next.js
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeout for large uploads
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    location @error401 {
        return 302 /login;
    }
}
