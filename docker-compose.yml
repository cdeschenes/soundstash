version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: soundstash
      POSTGRES_PASSWORD: soundstash
      POSTGRES_DB: soundstash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundstash"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://soundstash:soundstash@db:5432/soundstash"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:3232}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3232}"
      MEDIA_ROOT: "/media"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      EMAIL_FROM: "${EMAIL_FROM:-SoundStash <noreply@localhost>}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@soundstash.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-AdminPass123!}"
    volumes:
      - media_data:/media
    ports:
      - "3232:3000"

volumes:
  postgres_data:
  media_data:
